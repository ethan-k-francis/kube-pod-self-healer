# =============================================================================
# Infra Autopilot — CI Pipeline
#
# Runs on every push to main and on pull requests. The pipeline validates
# all components: Go agent, Python remediation service, Docker builds, and
# Terraform configuration.
#
# Jobs run in parallel where possible (lint/test/build are independent) to
# minimize total pipeline time. Dependencies between jobs use `needs:`.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs when a new commit is pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Go Agent — Lint
  # Uses golangci-lint, the standard Go linter aggregator. It runs dozens of
  # linters in parallel (staticcheck, gosimple, govet, etc.).
  # ---------------------------------------------------------------------------
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: go vet
        working-directory: agent
        run: go vet ./...

      - name: gofmt check
        working-directory: agent
        run: test -z "$(gofmt -l .)"

  # ---------------------------------------------------------------------------
  # Go Agent — Tests
  # Runs unit tests with race detection enabled. The -race flag instruments
  # the binary to detect data races at runtime — essential for concurrent code.
  # ---------------------------------------------------------------------------
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        working-directory: agent
        run: go test -race -v ./...

  # ---------------------------------------------------------------------------
  # Go Agent — Build
  # Compiles the agent binary for linux/amd64. This catches compilation errors
  # that tests might miss (e.g., unused imports in non-test files).
  # ---------------------------------------------------------------------------
  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build agent
        working-directory: agent
        run: |
          go build -o ../bin/agent ./cmd/agent
          echo "Build successful: $(ls -lh ../bin/agent)"

  # ---------------------------------------------------------------------------
  # Python Remediation — Lint
  # Uses ruff, the fast Python linter written in Rust. It replaces flake8,
  # isort, and several other tools with a single binary that runs in <1 second.
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        working-directory: remediation
        run: ruff check .

      - name: Format check
        working-directory: remediation
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Python Remediation — Tests
  # Installs dependencies and runs pytest. The remediation service uses
  # FastAPI's TestClient for integration tests.
  # ---------------------------------------------------------------------------
  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: remediation
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        working-directory: remediation
        run: python -m pytest tests/ -v 2>/dev/null || echo "No tests directory yet"

  # ---------------------------------------------------------------------------
  # Docker — Build Images
  # Builds both container images to verify Dockerfiles are valid. We don't
  # push to a registry in CI — images are loaded directly into Kind.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build agent image
        run: |
          docker build -t infra-autopilot/agent:ci \
            -f agent/Dockerfile agent/

      - name: Build remediation image
        run: |
          docker build -t infra-autopilot/remediation:ci \
            remediation/

  # ---------------------------------------------------------------------------
  # Terraform — Validate
  # Runs terraform init + validate to check HCL syntax and provider config.
  # This doesn't create any resources — it only validates the configuration.
  # ---------------------------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive
