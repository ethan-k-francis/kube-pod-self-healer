# =============================================================================
# Autopilot Namespace
#
# All kube-remediator workloads (health agent, remediation service, demo pods)
# run in this dedicated namespace. Namespaces provide resource isolation and
# make it easy to clean up everything with `kubectl delete ns kube-remediator`.
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: kube-remediator
  labels:
    # Labels make it easy to query and filter resources
    app.kubernetes.io/part-of: kube-remediator
    purpose: self-healing-demo
