# =============================================================================
# Remediation Service Deployment + Service
#
# The Python FastAPI remediation server runs as a K8s Deployment with a
# ClusterIP Service. The health agent communicates with it via the internal
# DNS name: remediation-service.autopilot.svc.cluster.local
#
# The remediation service needs the same RBAC permissions as the agent
# (pod delete, deployment scale, pod exec) because it's the one actually
# executing remediation actions via the K8s API.
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-service
  namespace: autopilot
  labels:
    app: remediation-service
    app.kubernetes.io/part-of: infra-autopilot
    app.kubernetes.io/component: remediation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remediation-service
  template:
    metadata:
      labels:
        app: remediation-service
        app.kubernetes.io/part-of: infra-autopilot
    spec:
      # Reuse the health-agent service account — the remediation service
      # needs the same K8s API permissions (delete pods, scale deployments)
      serviceAccountName: health-agent

      containers:
        - name: remediation
          image: infra-autopilot/remediation:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: PORT
              value: "8000"

          resources:
            limits:
              memory: "256Mi"
              cpu: "300m"
            requests:
              memory: "128Mi"
              cpu: "100m"

          # Liveness probe — FastAPI serves GET /health
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          # Readiness probe — same endpoint. The service is ready to accept
          # remediation requests once it responds to /health.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
# ClusterIP Service — makes the remediation server reachable via DNS
# within the cluster. The health agent connects to:
#   http://remediation-service.autopilot.svc.cluster.local:8000
apiVersion: v1
kind: Service
metadata:
  name: remediation-service
  namespace: autopilot
  labels:
    app: remediation-service
    app.kubernetes.io/part-of: infra-autopilot
spec:
  type: ClusterIP
  selector:
    app: remediation-service
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
